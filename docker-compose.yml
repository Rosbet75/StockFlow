services:
  db:
    image: postgres:16-alpine
    container_name: stockflow-db
    restart: always
    environment:
      POSTGRES_USER: user_stockflow
      POSTGRES_PASSWORD: password_123
      POSTGRES_DB: stockflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: